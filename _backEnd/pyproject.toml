# ==============================================================================
# Ruff — Fast Python Linter & Formatter
# Mifrufely Web Backend
# ==============================================================================

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["app", "tests"]
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "S",    # flake8-bandit (security)
    "T20",  # flake8-print
    "RUF",  # ruff-specific rules
    "ANN",  # flake8-annotations
    "ASYNC",# flake8-async
]
ignore = [
    "ANN101",  # missing type for self
    "ANN102",  # missing type for cls
    "S101",    # assert statements (needed in tests)
    "B008",    # do not perform function calls in default args (FastAPI Depends)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN", "T20"]
"app/infrastructure/workers/**/*.py" = ["ANN"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
force-sort-within-sections = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"


# ==============================================================================
# Black — Code Formatter
# ==============================================================================

[tool.black]
target-version = ["py311"]
line-length = 100
skip-string-normalization = false


# ==============================================================================
# MyPy — Static Type Checking
# ==============================================================================

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
check_untyped_defs = true
no_implicit_reexport = true
show_error_codes = true
pretty = true

[[tool.mypy.overrides]]
module = [
    "celery.*",
    "kombu.*",
    "passlib.*",
    "jose.*",
    "reportlab.*",
    "weasyprint.*",
    "faker.*",
]
ignore_missing_imports = true


# ==============================================================================
# Pytest
# ==============================================================================

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--tb=short",
    "-v",
]
markers = [
    "unit: Unit tests (no external I/O)",
    "integration: Integration tests (requires DB/Redis)",
    "e2e: End-to-end API tests",
]


# ==============================================================================
# Coverage
# ==============================================================================

[tool.coverage.run]
source = ["app"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
