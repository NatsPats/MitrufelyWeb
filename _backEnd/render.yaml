# ==============================================================================
# Mifrufely Web — Render.com Deployment Configuration (Blueprint)
# https://render.com/docs/yaml-spec
# ==============================================================================

services:

  # ── Web Service (FastAPI) ──────────────────────────────────────────────────
  - type: web
    name: mifrufely-backend
    runtime: python
    region: oregon
    plan: starter
    rootDir: _backEnd
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      # ── Application ─────────────────────────────────────────────
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_FORMAT
        value: json
      # ── Frontend URL (para links en emails de verificación/reset) ──
      # IMPORTANTE: Cambiar al dominio real de Vercel tras el deploy
      - key: FRONTEND_URL
        value: https://mitrufely-web.vercel.app
      # ── CORS — Orígenes permitidos ──────────────────────────────
      # IMPORTANTE: Cambiar al dominio real de Vercel tras el deploy
      - key: ALLOWED_ORIGINS
        value: '["https://mitrufely-web.vercel.app"]'
      # ── Database (set via Render dashboard — secret) ────────────
      - key: DATABASE_URL
        sync: false
      # ── JWT Secret Key ──────────────────────────────────────────
      - key: SECRET_KEY
        generateValue: true
      # ── Redis / Key Value ───────────────────────────────────────
      - key: REDIS_URL
        fromService:
          name: mifrufely-keyvalue
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: mifrufely-keyvalue
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: mifrufely-keyvalue
          type: keyvalue
          property: connectionString
      # ── Google OAuth (set via Render dashboard — secret) ────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      # ── SMTP (set via Render dashboard — secrets) ───────────────
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      # ── Cloudinary (set via Render dashboard — secrets) ─────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── Key Value (Redis-compatible via Valkey) ─────────────────────────────────
  - type: keyvalue
    name: mifrufely-keyvalue
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Internal only
