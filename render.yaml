# ==============================================================================
# Mifrufely Web — Render.com Deployment Configuration (Blueprint)
# https://render.com/docs/yaml-spec
#
# Stack:
#   - mifrufely-backend → Docker (FastAPI via uvicorn, production stage)
#   - mifrufely-keyvalue → Valkey/Redis (free tier, internal network)
#
# Database: NeonDB (external PostgreSQL) — configured via DATABASE_URL secret.
# ==============================================================================

services:

  # ── Web Service (FastAPI via Docker) ──────────────────────────────────────
  - type: web
    name: mifrufely-backend
    runtime: docker
    region: oregon
    plan: starter
    rootDir: _backEnd
    # Render will build from _backEnd/Dockerfile and target the "production" stage.
    dockerfilePath: Dockerfile
    dockerContext: .
    dockerBuildTarget: production
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      # ── Application ─────────────────────────────────────────────
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_FORMAT
        value: json
      # ── Frontend URL (para links en emails de verificación/reset) ──
      # IMPORTANTE: Cambiar al dominio real de Vercel tras el deploy
      - key: FRONTEND_URL
        value: https://mitrufely.vercel.app
      # ── CORS — Orígenes permitidos ──────────────────────────────
      # IMPORTANTE: Cambiar al dominio real de Vercel tras el deploy
      - key: ALLOWED_ORIGINS
        value: '["https://mitrufely.vercel.app"]'
      # ── Database (NeonDB — set via Render dashboard, never commit) ──
      # Format: postgresql+asyncpg://user:pass@host/db?sslmode=require
      - key: DATABASE_URL
        sync: false
      # ── JWT Secret Key (auto-generated by Render) ───────────────
      - key: SECRET_KEY
        generateValue: true
      # ── Redis / Key Value (linked from mifrufely-keyvalue service) ─
      - key: REDIS_URL
        fromService:
          name: mifrufely-keyvalue
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: mifrufely-keyvalue
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: mifrufely-keyvalue
          type: keyvalue
          property: connectionString
      # ── Google OAuth (set via Render dashboard — secret) ────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      # ── SMTP Gmail (set via Render dashboard — secrets) ─────────
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      # ── Cloudinary (set via Render dashboard — secrets) ─────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── Key Value (Redis-compatible via Valkey) ─────────────────────────────────
  - type: keyvalue
    name: mifrufely-keyvalue
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Internal only — accessible only from services in the same region
